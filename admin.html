<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width,
             initial-scale=1.0,
             minimum-scale=1.0,
             maximum-scale=1.0,
             user-scalable=no,
             viewport-fit=cover">

  <title>MT Admin</title>

  <link rel="manifest" href="manifest-admin.json">

<link rel="icon" type="image/png" href="Icones/Image/MTAdmin.png">
<link rel="apple-touch-icon" href="Icones/Image/MTAdmin.png">
  
  <meta name="theme-color" content="#070707">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MT Admin">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    button{
      touch-action:manipulation;
      font-family:inherit;
    }

    html{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }

    body{
      font-family:"Poppins",sans-serif;
      min-height:100vh;
      min-height:100dvh;
      background:
        radial-gradient(circle at top left,rgba(255,216,107,.24),transparent 34%),
        radial-gradient(circle at bottom right,rgba(184,134,11,.18),transparent 34%),
        #070707;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:18px;
      overscroll-behavior:none;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
        linear-gradient(120deg,rgba(255,215,120,.06),transparent,rgba(255,215,120,.03));
      backdrop-filter:blur(10px);
      pointer-events:none;
    }

    .bg::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:70px 70px;
      opacity:.55;
    }

    .login-card{
      position:relative;
      width:100%;
      max-width:420px;
      padding:38px 34px;
      border-radius:30px;
      background:rgba(255,255,255,.065);
      border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(24px);
      box-shadow:
        0 0 60px rgba(255,215,120,.12),
        0 25px 80px rgba(0,0,0,.55);
      z-index:2;
      text-align:center;
      animation:fade .7s ease;
      overflow:hidden;
    }

    .login-card::before{
      content:"";
      position:absolute;
      width:240px;
      height:240px;
      border-radius:50%;
      background:radial-gradient(circle,rgba(255,216,107,.16),transparent 70%);
      top:-120px;
      right:-120px;
      pointer-events:none;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(22px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      width:150px;
      height:150px;
      margin:0 auto 20px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:28px;
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,216,107,.16);
      box-shadow:0 18px 50px rgba(0,0,0,.25);
      overflow:hidden;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      user-select:none;
      pointer-events:none;
    }

    .admin-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      height:34px;
      padding:0 14px;
      border-radius:999px;
      background:rgba(255,216,107,.12);
      border:1px solid rgba(255,216,107,.22);
      color:#ffd86b;
      font-size:12px;
      font-weight:800;
      margin-bottom:14px;
    }

    h1{
      font-size:34px;
      margin-bottom:10px;
      line-height:1.1;
      font-weight:800;
      letter-spacing:-1px;
    }

    p{
      color:#cfcfcf;
      line-height:1.6;
      margin-bottom:28px;
      font-size:15px;
    }

    .login-btn{
      width:100%;
      height:56px;
      border:none;
      border-radius:17px;
      background:linear-gradient(135deg,#ffd86b,#b8860b);
      color:#111;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      transition:.25s;
      box-shadow:0 12px 35px rgba(255,215,120,.25);
    }

    .login-btn:hover{
      transform:translateY(-2px) scale(1.01);
      box-shadow:0 18px 45px rgba(255,215,120,.35);
    }

    .status{
      margin-top:18px;
      color:#ffb3b3;
      font-size:13px;
      min-height:20px;
    }

    .safe-text{
      margin-top:18px;
      color:#8d8d8d;
      font-size:12px;
      line-height:1.5;
    }

    @media(max-width:480px){
      body{
        padding:14px;
      }

      .login-card{
        max-width:360px;
        padding:28px 22px;
        border-radius:24px;
      }

      .logo{
        width:118px;
        height:118px;
        border-radius:24px;
        margin-bottom:18px;
      }

      h1{
        font-size:27px;
      }

      p{
        font-size:13px;
        margin-bottom:24px;
      }

      .login-btn{
        height:52px;
        font-size:14px;
        border-radius:15px;
      }

      .status{
        font-size:12px;
      }
    }

    @media(max-width:360px){
      .login-card{
        padding:24px 18px;
        border-radius:22px;
      }

      .logo{
        width:105px;
        height:105px;
      }

      h1{
        font-size:24px;
      }

      p{
        font-size:12px;
      }

      .login-btn{
        height:48px;
        font-size:13px;
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="login-card">

    <div class="logo">
      <img
        src="Icones/Image/MTAdmin.png"
        alt="MT Admin"
        draggable="false">
    </div>

    <div class="admin-badge">
      Painel Administrativo
    </div>

    <h1>MT Admin</h1>

    <p>Painel privado do MT Varejão OFC</p>

    <button id="loginBtn" class="login-btn">
      Entrar com Google
    </button>

    <div id="status" class="status"></div>

    <div class="safe-text">
      Acesso exclusivo para administrador autorizado.
    </div>

  </div>

  <script type="module">
    import { auth, provider, ADMIN_EMAIL } from "./firebase.js";

    import {
      signInWithPopup,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const loginBtn = document.getElementById("loginBtn");
    const status = document.getElementById("status");

    loginBtn.addEventListener("click", async () => {
      try{
        status.innerHTML = "Abrindo login...";

        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        if(user.email !== ADMIN_EMAIL){
          status.innerHTML = "Acesso negado.";
          await signOut(auth);
          return;
        }

        status.innerHTML = "Entrando no painel...";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 800);

      }catch(error){
        console.error(error);
        status.innerHTML = "Erro ao entrar.";
      }
    });

    onAuthStateChanged(auth,(user)=>{
      if(!user) return;

      if(user.email === ADMIN_EMAIL){
        window.location.href = "dashboard.html";
      }
    });

    document.addEventListener("wheel", (e) => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
      }
    }, { passive:false });

    document.addEventListener("keydown", (e) => {
      const blockedKeys = ["+", "-", "=", "0"];

      if ((e.ctrlKey || e.metaKey) && blockedKeys.includes(e.key)) {
        e.preventDefault();
      }
    });
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width,
             initial-scale=1.0,
             minimum-scale=1.0,
             maximum-scale=1.0,
             user-scalable=no,
             viewport-fit=cover">

  <title>Lure Admin Dashboard</title>

  <link rel="manifest" href="manifest-admin.json">

  <!-- Ícones atualizados para LAroxo.png -->
  <link rel="icon" type="image/png" href="Icones/Image/LAroxo.png">
  <link rel="apple-touch-icon" href="Icones/Image/LAroxo.png">

  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Lure Admin">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="studio.css">

  <style>
    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0a0a0a;
      --card: rgba(255, 255, 255, 0.05);
      --card2: rgba(255, 255, 255, 0.02);
      --line: rgba(255, 255, 255, 0.08);
      --accent: #ffffff;
      --accent2: #cccccc;
      --text: #ffffff;
      --muted: #aaaaaa;
      --danger: #ff5757;
      --radius: 22px;
    }

    html {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overscroll-behavior: auto;
      scroll-behavior: smooth;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      overscroll-behavior: auto;
    }

    /* Textura sutil de fundo */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
      z-index: -1;
      opacity: 0.6;
    }

    button,
    input {
      font-family: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      touch-action: manipulation;
    }

    /* ===== LAYOUT PRINCIPAL ===== */
    .dashboard {
      width: 100%;
      max-width: 1540px;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
    }

    /* ===== ASIDE (menu lateral) ===== */
    aside {
      height: 100vh;
      height: 100dvh;
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 22px 18px;
      border-right: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(22px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 42px;
    }

    .brand-icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 28px;
      font-weight: 900;
      box-shadow: 0 0 28px rgba(255, 255, 255, 0.03);
      flex-shrink: 0;
      user-select: none;
      overflow: hidden;
    }

    .brand-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand h1 {
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 4px;
      font-weight: 900;
      margin-top: 5px;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-item {
      height: 50px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 15px;
      color: #cfcfcf;
      font-size: 13px;
      font-weight: 700;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: 0.25s;
      user-select: none;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
    }

    .nav-item.active {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .admin-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.04);
      margin-bottom: 14px;
    }

    .admin-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 13px;
    }

    .admin-mini {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.04);
      flex-shrink: 0;
    }

    .admin-mini img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .admin-email {
      font-size: 10px;
      color: var(--muted);
      margin-top: 7px;
      word-break: break-all;
      line-height: 1.4;
    }

    .logout,
    .drawer-logout {
      width: 100%;
      height: 48px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      border: 1px solid var(--line);
      font-weight: 800;
      transition: 0.25s;
    }

    .logout:hover,
    .drawer-logout:hover {
      background: rgba(255, 92, 92, 0.12);
      border-color: rgba(255, 92, 92, 0.35);
      color: #ffb3b3;
    }

    /* ===== MAIN ===== */
    main {
      width: 100%;
      min-width: 0;
      padding: 30px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
    }

    .page-title {
      min-width: 0;
    }

    .page-title h2 {
      font-size: 34px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .page-title p {
      color: var(--muted);
      margin-top: 7px;
      font-size: 14px;
      line-height: 1.5;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .search {
      width: 280px;
      height: 50px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.25);
      color: #fff;
      padding: 0 17px;
      outline: none;
      font-size: 14px;
      transition: 0.2s;
    }

    .search:focus {
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
    }

    .mobile-menu,
    .install-btn {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.25s;
      flex-shrink: 0;
    }

    .mobile-menu {
      display: none;
      font-size: 22px;
    }

    .install-btn {
      display: none;
    }

    .install-btn img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .mobile-menu:hover,
    .install-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .content-grid {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(300px, 390px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .single-grid {
      grid-template-columns: 1fr;
    }

    .card {
      background: linear-gradient(145deg, var(--card), var(--card2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(22px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.22);
      overflow: hidden;
      min-width: 0;
    }

    .card-header {
      padding: 21px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 900;
    }

    .badge {
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
    }

    .form {
      padding: 21px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
      color: #eee;
      font-weight: 700;
    }

    .field {
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      height: 49px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      background: rgba(0, 0, 0, 0.25);
      color: white;
      outline: none;
      padding: 0 15px;
      transition: 0.2s;
      font-size: 14px;
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
    }

    input::placeholder {
      color: #777;
    }

    .add {
      width: 100%;
      height: 53px;
      border-radius: 16px;
      background: #ffffff;
      color: #0a0a0a;
      font-size: 15px;
      font-weight: 900;
      transition: 0.25s;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.3);
    }

    .add:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.4);
      background: #f0f0f0;
    }

    .add:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .cancel-edit {
      width: 100%;
      height: 48px;
      margin-top: 10px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-weight: 900;
      display: none;
      transition: 0.25s;
    }

    .cancel-edit:hover {
      background: rgba(255, 87, 87, 0.10);
      border-color: rgba(255, 87, 87, 0.25);
      color: #ffb3b3;
    }

    .hint {
      margin-top: 16px;
      color: #8d8d8d;
      font-size: 12px;
      line-height: 1.5;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 22px;
    }

    .stat-card {
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .stat-card span {
      color: var(--muted);
      font-size: 13px;
    }

    .stat-card strong {
      display: block;
      margin-top: 7px;
      font-size: 30px;
      color: var(--accent);
      font-weight: 900;
    }

    .products-list {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 565px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .products-list::-webkit-scrollbar {
      width: 7px;
    }

    .products-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .products-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 999px;
    }

    .product {
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 78px;
      padding: 10px;
      border-radius: 17px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      transition: 0.25s;
      min-width: 0;
    }

    .product:hover {
      background: rgba(255, 255, 255, 0.07);
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .thumb {
      width: 62px;
      height: 62px;
      border-radius: 15px;
      object-fit: cover;
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .product strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
      line-height: 1.25;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product span {
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
    }

    .product small {
      display: block;
      color: #888;
      margin-top: 4px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 10px;
    }

    .product-actions {
      display: flex;
      gap: 7px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: 0.2s;
      font-size: 14px;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--accent);
    }

    .edit:hover {
      background: rgba(255, 255, 255, 0.13);
      color: var(--accent);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .delete:hover {
      background: rgba(255, 92, 92, 0.14);
      color: #ff8f8f;
      border-color: rgba(255, 92, 92, 0.25);
    }

    .empty {
      text-align: center;
      padding: 42px 18px;
      color: #999;
      font-size: 13px;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      background: rgba(10, 10, 10, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 13px 17px;
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: 0.25s;
      z-index: 999;
      font-size: 13px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* ===== BOTTOM NAV (mobile) ===== */
    .bottom-nav,
    .mobile-drawer,
    .drawer-overlay {
      display: none;
    }

    /* ===== RESPONSIVO ===== */
    @media (max-width: 1180px) {
      .dashboard {
        grid-template-columns: 230px minmax(0, 1fr);
      }
      aside {
        padding: 20px 14px;
      }
      main {
        padding: 24px 18px;
      }
      .content-grid {
        grid-template-columns: minmax(290px, 360px) minmax(0, 1fr);
        gap: 15px;
      }
      .search {
        width: 220px;
      }
      .page-title h2 {
        font-size: 31px;
      }
      .brand h1 {
        font-size: 18px;
      }
      .nav-item {
        font-size: 12px;
        padding: 0 12px;
      }
    }

    @media (max-width: 900px) {
      .dashboard {
        grid-template-columns: 210px minmax(0, 1fr);
      }
      aside {
        padding: 18px 12px;
      }
      main {
        padding: 20px 14px;
      }
      .topbar {
        gap: 12px;
      }
      .search {
        width: 190px;
      }
      .content-grid {
        grid-template-columns: 1fr;
      }
      .products-list {
        max-height: 460px;
      }
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .dashboard {
        display: block;
        min-height: 100vh;
      }
      aside {
        display: none;
      }
      main {
        padding: 12px 10px 84px;
      }
      .topbar {
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .page-title {
        flex: 1;
        min-width: 0;
      }
      .page-title h2 {
        font-size: 21px;
        line-height: 1.05;
        letter-spacing: -0.6px;
      }
      .page-title p {
        font-size: 11px;
        margin-top: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .top-actions {
        gap: 8px;
      }
      .search,
      .top-actions .brand-icon {
        display: none !important;
      }
      .mobile-menu {
        display: flex;
      }
      .mobile-menu,
      .install-btn {
        width: 43px;
        height: 43px;
        border-radius: 14px;
      }
      .install-btn img {
        width: 19px;
        height: 19px;
      }
      .content-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .card {
        border-radius: 19px;
      }
      .card-header {
        padding: 15px;
      }
      .card-title {
        font-size: 16px;
      }
      .form {
        padding: 14px;
      }
      .field {
        margin-bottom: 12px;
      }
      label {
        font-size: 12px;
        margin-bottom: 6px;
      }
      input {
        height: 42px;
        font-size: 12px;
        border-radius: 12px;
        padding: 0 13px;
      }
      .add {
        height: 47px;
        font-size: 13px;
        border-radius: 14px;
      }
      .cancel-edit {
        height: 43px;
        font-size: 12px;
        border-radius: 13px;
      }
      .hint {
        font-size: 10.5px;
        margin-top: 12px;
      }
      .stats-grid {
        grid-template-columns: 1fr;
        padding: 13px;
        gap: 10px;
      }
      .stat-card {
        padding: 14px;
        border-radius: 16px;
      }
      .stat-card strong {
        font-size: 24px;
      }
      .products-list {
        padding: 10px;
        gap: 9px;
        max-height: none;
        overflow: visible;
      }
      .product {
        grid-template-columns: 50px minmax(0, 1fr) auto;
        gap: 9px;
        padding: 9px;
        border-radius: 15px;
        min-height: 68px;
      }
      .thumb {
        width: 50px;
        height: 50px;
        border-radius: 12px;
      }
      .product strong {
        font-size: 12.5px;
        line-height: 1.25;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        white-space: normal;
        overflow: hidden;
      }
      .product span {
        font-size: 11px;
      }
      .product small {
        display: none;
      }
      .product-actions {
        gap: 5px;
      }
      .icon-btn {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        font-size: 13px;
      }

      .bottom-nav {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: 10px;
        height: 58px;
        border-radius: 20px;
        background: rgba(15, 15, 15, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(24px);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        z-index: 50;
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.45);
      }

      .bottom-nav div {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        color: #999;
        font-size: 10px;
        cursor: pointer;
        user-select: none;
      }

      .bottom-nav .active {
        color: var(--accent);
      }

      .drawer-overlay {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.56);
        opacity: 0;
        pointer-events: none;
        transition: 0.25s;
        z-index: 80;
      }

      .drawer-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      .mobile-drawer {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: min(84vw, 320px);
        height: 100vh;
        height: 100dvh;
        background: rgba(12, 12, 12, 0.97);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(26px);
        z-index: 90;
        padding: 20px;
        flex-direction: column;
        justify-content: space-between;
        transform: translateX(-105%);
        transition: 0.28s ease;
      }

      .mobile-drawer.show {
        transform: translateX(0);
      }

      .drawer-close {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        border: 1px solid var(--line);
        font-size: 20px;
      }

      .drawer-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .drawer-user {
        margin-bottom: 20px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--line);
      }

      .drawer-user strong {
        display: block;
        font-size: 14px;
      }

      .drawer-user span {
        color: var(--muted);
        font-size: 11px;
        word-break: break-all;
      }

      .drawer-logout {
        height: 50px;
        border-radius: 16px;
        background: rgba(255, 87, 87, 0.08);
        border: 1px solid rgba(255, 87, 87, 0.3);
        color: #ff9a9a;
        font-weight: 800;
      }
    }

    @media (max-width: 380px) {
      main {
        padding: 10px 8px 80px;
      }
      .page-title h2 {
        font-size: 19px;
      }
      .page-title p {
        font-size: 10px;
      }
      .mobile-menu,
      .install-btn {
        width: 40px;
        height: 40px;
        border-radius: 13px;
      }
      .card-header {
        padding: 13px;
      }
      .form {
        padding: 13px;
      }
      input {
        height: 40px;
      }
      .product {
        grid-template-columns: 46px minmax(0, 1fr) auto;
        gap: 8px;
        padding: 8px;
      }
      .thumb {
        width: 46px;
        height: 46px;
      }
      .product strong {
        font-size: 12px;
      }
      .icon-btn {
        width: 30px;
        height: 30px;
      }
      .bottom-nav {
        height: 56px;
      }
    }
  </style>
</head>

<body>

  <!-- ===== DRAWER MOBILE ===== -->
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <div class="mobile-drawer" id="mobileDrawer">
    <div>
      <div class="drawer-head">
        <div class="brand" style="margin-bottom:0;">
          <div class="brand-icon">
            <img src="Icones/Image/LAroxo.png" alt="Lure Admin" draggable="false">
          </div>
          <div>
            <h1>LURE ADMIN</h1>
            <span>STORE</span>
          </div>
        </div>
        <button class="drawer-close" id="drawerClose" type="button">×</button>
      </div>

      <div class="drawer-user">
        <strong>Lure Admin</strong>
        <span id="drawerEmail">admin</span>
      </div>

      <nav>
        <div class="nav-item" data-page="overview">⌂ Visão Geral</div>
        <div class="nav-item active" data-page="products">▱ Produtos</div>
        <div class="nav-item" data-page="studio">🎨 Studio</div>
        <div class="nav-item" data-page="stats">▥ Estatísticas</div>
        <div class="nav-item" data-page="settings">⚙ Configurações</div>
      </nav>
    </div>

    <button class="drawer-logout" id="drawerLogoutBtn" type="button">Sair da conta</button>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <div class="dashboard">

    <!-- ASIDE (desktop) -->
    <aside>
      <div>
        <div class="brand">
          <div class="brand-icon">
            <img src="Icones/Image/LAroxo.png" alt="Lure Admin" draggable="false">
          </div>
          <div>
            <h1>LURE ADMIN</h1>
            <span>STORE</span>
          </div>
        </div>

        <nav>
          <div class="nav-item" data-page="overview">⌂ Visão Geral</div>
          <div class="nav-item active" data-page="products">▱ Produtos</div>
          <div class="nav-item" data-page="studio">🎨 Studio</div>
          <div class="nav-item" data-page="stats">▥ Estatísticas</div>
          <div class="nav-item" data-page="settings">⚙ Configurações</div>
        </nav>
      </div>

      <div>
        <div class="admin-box">
          <div class="admin-name">
            <div class="admin-mini">
              <img src="Icones/Image/LAroxo.png" alt="Lure" draggable="false">
            </div>
            <div>Lure Admin</div>
          </div>
          <div class="admin-email" id="adminEmail">admin</div>
        </div>
        <button class="logout" id="logoutBtn" type="button">Sair</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main>
      <div class="topbar">
        <button class="mobile-menu" id="mobileMenuBtn" type="button">☰</button>

        <div class="page-title">
          <h2>Produtos</h2>
          <p>Gerencie os produtos da Lure Store</p>
        </div>

        <div class="top-actions">
          <input class="search" id="searchInput" placeholder="Buscar produto...">

          <button class="install-btn" id="installBtn" type="button">
            <img src="Icones/Icon/install.svg" alt="" draggable="false">
          </button>

          <div class="brand-icon" style="width:50px;height:50px;border-radius:16px;">
            <img src="Icones/Image/LAroxo.png" alt="Lure Admin" draggable="false">
          </div>
        </div>
      </div>

      <div class="content-grid" id="contentGrid"></div>
    </main>

  </div>

  <!-- ===== BOTTOM NAV (mobile) ===== -->
  <div class="bottom-nav">
    <div data-page="overview">⌂<span>Início</span></div>
    <div class="active" data-page="products">▱<span>Produtos</span></div>
    <div data-page="studio">🎨<span>Studio</span></div>
    <div data-page="stats">▥<span>Stats</span></div>
    <div data-page="settings">⚙<span>Config.</span></div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast"></div>

  <!-- ===== SCRIPTS ===== -->
  <script type="module" src="studio.js"></script>

  <script type="module">
    import { auth, db, ADMIN_EMAIL } from "./firebase.js";

    import {
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      updateDoc,
      doc,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const logoutBtn = document.getElementById("logoutBtn");
    const drawerLogoutBtn = document.getElementById("drawerLogoutBtn");
    const contentGrid = document.getElementById("contentGrid");
    const searchInput = document.getElementById("searchInput");
    const toast = document.getElementById("toast");
    const adminEmail = document.getElementById("adminEmail");
    const drawerEmail = document.getElementById("drawerEmail");
    const pageTitle = document.querySelector(".page-title h2");
    const pageSubtitle = document.querySelector(".page-title p");
    const navItems = document.querySelectorAll("[data-page]");

    const mobileMenuBtn = document.getElementById("mobileMenuBtn");
    const mobileDrawer = document.getElementById("mobileDrawer");
    const drawerOverlay = document.getElementById("drawerOverlay");
    const drawerClose = document.getElementById("drawerClose");

    let allProducts = [];
    let currentPage = "products";
    let editingProductId = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function openDrawer() {
      mobileDrawer.classList.add("show");
      drawerOverlay.classList.add("show");
    }

    function closeDrawer() {
      mobileDrawer.classList.remove("show");
      drawerOverlay.classList.remove("show");
    }

    if (mobileMenuBtn) mobileMenuBtn.addEventListener("click", openDrawer);
    if (drawerClose) drawerClose.addEventListener("click", closeDrawer);
    if (drawerOverlay) drawerOverlay.addEventListener("click", closeDrawer);

    function setActivePage(page) {
      navItems.forEach(item => {
        item.classList.toggle("active", item.dataset.page === page);
      });
    }

    function afterPageChange() {
      closeDrawer();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    // ===== PÁGINAS =====
    function renderOverview() {
      currentPage = "overview";
      setActivePage("overview");
      pageTitle.textContent = "Visão Geral";
      pageSubtitle.textContent = "Resumo rápido do painel";
      searchInput.style.display = "none";
      contentGrid.className = "content-grid single-grid";
      contentGrid.innerHTML = `
        <section class="card">
          <div class="card-header">
            <div class="card-title">⌂ Resumo</div>
          </div>
          <div class="stats-grid">
            <div class="stat-card">
              <span>Produtos cadastrados</span>
              <strong>${allProducts.length}</strong>
            </div>
            <div class="stat-card">
              <span>Página pública</span>
              <strong>ON</strong>
            </div>
            <div class="stat-card">
              <span>Banco Firestore</span>
              <strong>OK</strong>
            </div>
          </div>
        </section>
      `;
      afterPageChange();
    }

    function renderStats() {
      currentPage = "stats";
      setActivePage("stats");
      pageTitle.textContent = "Estatísticas";
      pageSubtitle.textContent = "Dados dos produtos";
      searchInput.style.display = "none";
      contentGrid.className = "content-grid single-grid";
      contentGrid.innerHTML = `
        <section class="card">
          <div class="card-header">
            <div class="card-title">▥ Estatísticas</div>
          </div>
          <div class="stats-grid">
            <div class="stat-card">
              <span>Total de produtos</span>
              <strong>${allProducts.length}</strong>
            </div>
            <div class="stat-card">
              <span>Produtos com imagem</span>
              <strong>${allProducts.filter(p => p.image).length}</strong>
            </div>
            <div class="stat-card">
              <span>Produtos com link</span>
              <strong>${allProducts.filter(p => p.link).length}</strong>
            </div>
          </div>
          <div class="form">
            <p class="hint">
              Em breve você pode adicionar contagem de cliques, visitas e conversões.
            </p>
          </div>
        </section>
      `;
      afterPageChange();
    }

    function renderSettings() {
      currentPage = "settings";
      setActivePage("settings");
      pageTitle.textContent = "Configurações";
      pageSubtitle.textContent = "Ajustes do Lure Admin";
      searchInput.style.display = "none";
      contentGrid.className = "content-grid single-grid";
      contentGrid.innerHTML = `
        <section class="card">
          <div class="card-header">
            <div class="card-title">⚙ Configurações</div>
          </div>
          <div class="form">
            <div class="field">
              <label>Email administrador</label>
              <input value="${ADMIN_EMAIL}" readonly>
            </div>
            <div class="field">
              <label>Status do painel</label>
              <input value="Conectado ao Firebase" readonly>
            </div>
            <button class="logout" id="settingsLogoutBtn" type="button" style="margin-top:8px;">
              Sair da conta
            </button>
            <p class="hint">
              As configurações sensíveis continuam protegidas no firebase.js e nas regras do Firestore.
            </p>
          </div>
        </section>
      `;
      document.getElementById("settingsLogoutBtn").onclick = logoutAdmin;
      afterPageChange();
    }

    function renderStudio() {
      currentPage = "studio";
      setActivePage("studio");
      pageTitle.textContent = "Studio";
      pageSubtitle.textContent = "Crie artes para a Lure Store";
      searchInput.style.display = "none";
      contentGrid.className = "content-grid single-grid";
      contentGrid.innerHTML = `
        <section class="card">
          <div class="card-header">
            <div class="card-title">🎨 Lure Studio</div>
          </div>
          <div id="studioRoot"></div>
        </section>
      `;
      if (window.initZyqenStudio) {
        window.initZyqenStudio(allProducts);
      } else {
        document.getElementById("studioRoot").innerHTML = `
          <div class="form">
            <p class="hint">studio.js ainda não carregou ou não possui window.initZyqenStudio.</p>
          </div>
        `;
      }
      afterPageChange();
    }

    // ===== PRODUTOS =====
    function renderProductsLayout() {
      currentPage = "products";
      setActivePage("products");
      pageTitle.textContent = "Produtos";
      pageSubtitle.textContent = "Gerencie os produtos da Lure Store";
      searchInput.style.display = "block";
      contentGrid.className = "content-grid";

      contentGrid.innerHTML = `
        <section class="card">
          <div class="card-header">
            <div class="card-title" id="formTitle">▱ Adicionar Produto</div>
          </div>
          <div class="form">
            <div class="field">
              <label>Nome do produto</label>
              <input id="name" placeholder="Ex: iPhone 15 Pro Max">
            </div>
            <div class="field">
              <label>Preço</label>
              <input id="price" placeholder="Ex: 4999.90">
            </div>
            <div class="field">
              <label>Imagem do produto</label>
              <input id="image" placeholder="URL da imagem">
            </div>
            <div class="field">
              <label>Link afiliado</label>
              <input id="link" placeholder="https://exemplo.com/seu-link">
            </div>
            <button class="add" id="addBtn" type="button">+ Adicionar Produto</button>
            <button class="cancel-edit" id="cancelEditBtn" type="button">
              Cancelar edição
            </button>
            <div class="hint" id="formHint">
              Produtos novos aparecem automaticamente no topo da lista.
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">
              Produtos Cadastrados
              <span class="badge" id="countBadge">0</span>
            </div>
          </div>
          <div class="products-list" id="products">
            <div class="empty">Carregando produtos...</div>
          </div>
        </section>
      `;

      document.getElementById("addBtn").onclick = saveProduct;
      document.getElementById("cancelEditBtn").onclick = cancelEdit;

      renderProducts(allProducts);
      updateFormMode();
      afterPageChange();
    }

    function updateFormMode() {
      const addBtn = document.getElementById("addBtn");
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      const formTitle = document.getElementById("formTitle");
      const formHint = document.getElementById("formHint");

      if (!addBtn || !cancelEditBtn) return;

      if (editingProductId) {
        addBtn.textContent = "Salvar Alterações";
        cancelEditBtn.style.display = "block";
        if (formTitle) formTitle.textContent = "✎ Editar Produto";
        if (formHint) formHint.textContent = "Você está editando um produto. Altere os campos e clique em Salvar Alterações.";
      } else {
        addBtn.textContent = "+ Adicionar Produto";
        cancelEditBtn.style.display = "none";
        if (formTitle) formTitle.textContent = "▱ Adicionar Produto";
        if (formHint) formHint.textContent = "Produtos novos aparecem automaticamente no topo da lista.";
      }
    }

    function clearProductForm() {
      const name = document.getElementById("name");
      const price = document.getElementById("price");
      const image = document.getElementById("image");
      const link = document.getElementById("link");
      if (name) name.value = "";
      if (price) price.value = "";
      if (image) image.value = "";
      if (link) link.value = "";
    }

    function cancelEdit() {
      editingProductId = null;
      clearProductForm();
      updateFormMode();
      showToast("Edição cancelada.");
    }

    function startEditProduct(product) {
      const name = document.getElementById("name");
      const price = document.getElementById("price");
      const image = document.getElementById("image");
      const link = document.getElementById("link");

      if (!name || !price || !image || !link) {
        renderProductsLayout();
        setTimeout(() => startEditProduct(product), 80);
        return;
      }

      editingProductId = product.id;
      name.value = product.name || "";
      price.value = product.price || "";
      image.value = product.image || "";
      link.value = product.link || "";
      updateFormMode();
      window.scrollTo({ top: 0, behavior: "smooth" });
      showToast("Produto aberto para edição.");
    }

    async function saveProduct() {
      const addBtn = document.getElementById("addBtn");

      const name = document.getElementById("name").value.trim();
      const price = document.getElementById("price").value.trim();
      const image = document.getElementById("image").value.trim();
      const link = document.getElementById("link").value.trim();

      if (!name || !price) {
        showToast("Preencha nome e preço.");
        return;
      }

      addBtn.disabled = true;
      addBtn.textContent = editingProductId ? "Salvando..." : "Adicionando...";

      try {
        const user = auth.currentUser;
        if (!user) {
          showToast("Você precisa estar logado.");
          return;
        }

        if (editingProductId) {
          await updateDoc(doc(db, "products", editingProductId), {
            name,
            price,
            image,
            link,
            updatedAt: Date.now(),
            updatedBy: user.email
          });
          showToast("Produto atualizado.");
          editingProductId = null;
        } else {
          await addDoc(collection(db, "products"), {
            name,
            price,
            image,
            link,
            createdAt: Date.now(),
            createdBy: user.email
          });
          showToast("Produto adicionado.");
        }

        await loadProducts();
        clearProductForm();
        updateFormMode();

      } catch (error) {
        console.error(error);
        showToast(editingProductId ? "Erro ao salvar edição." : "Erro ao adicionar.");
      }

      addBtn.disabled = false;
      updateFormMode();
    }

    async function loadProducts() {
      try {
        const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        allProducts = [];
        snap.forEach((docItem) => {
          allProducts.push({
            id: docItem.id,
            ...docItem.data()
          });
        });
        if (currentPage === "products") {
          renderProductsLayout();
        }
      } catch (error) {
        console.error(error);
        showToast("Erro ao carregar produtos.");
      }
    }

    function renderProducts(products) {
      const productsContainer = document.getElementById("products");
      const countBadge = document.getElementById("countBadge");
      if (!productsContainer || !countBadge) return;

      productsContainer.innerHTML = "";
      countBadge.textContent = products.length;

      if (products.length === 0) {
        productsContainer.innerHTML = `<div class="empty">Nenhum produto cadastrado ainda.</div>`;
        return;
      }

      products.forEach((p) => {
        const div = document.createElement("div");
        div.className = "product";

        const image = p.image || "https://via.placeholder.com/300";
        const name = p.name || "Sem nome";
        const price = p.price || "0";
        const link = p.link || "#";

        div.innerHTML = `
          <img class="thumb" src="${image}" alt="${name}">
          <div>
            <strong>${name}</strong>
            <span>R$ ${price}</span>
            <small>${link}</small>
          </div>
          <div class="product-actions">
            <button class="icon-btn open" type="button" title="Abrir produto">↗</button>
            <button class="icon-btn edit" type="button" title="Editar produto">✎</button>
            <button class="icon-btn delete" type="button" title="Excluir produto">🗑</button>
          </div>
        `;

        div.querySelector(".open").onclick = () => {
          if (link && link !== "#") window.open(link, "_blank");
        };

        div.querySelector(".edit").onclick = () => {
          startEditProduct(p);
        };

        div.querySelector(".delete").onclick = async () => {
          const confirmDelete = confirm(`Excluir "${name}"?`);
          if (!confirmDelete) return;

          try {
            const user = auth.currentUser;
            if (!user) {
              showToast("Você precisa estar logado.");
              return;
            }

            await deleteDoc(doc(db, "products", p.id));

            if (editingProductId === p.id) {
              editingProductId = null;
              clearProductForm();
              updateFormMode();
            }

            showToast("Produto removido.");
            await loadProducts();

          } catch (error) {
            console.error(error);
            showToast("Erro ao remover.");
          }
        };

        productsContainer.appendChild(div);
      });
    }

    // ===== BUSCA =====
    searchInput.addEventListener("input", () => {
      const term = searchInput.value.toLowerCase().trim();
      const filtered = allProducts.filter((p) =>
        String(p.name || "").toLowerCase().includes(term)
      );
      renderProducts(filtered);
    });

    // ===== NAVEGAÇÃO =====
    navItems.forEach(item => {
      item.addEventListener("click", () => {
        const page = item.dataset.page;
        if (page === "overview") renderOverview();
        if (page === "products") renderProductsLayout();
        if (page === "studio") renderStudio();
        if (page === "stats") renderStats();
        if (page === "settings") renderSettings();
      });
    });

    // ===== AUTENTICAÇÃO =====
    onAuthStateChanged(auth, async (user) => {
      if (!user || user.email !== ADMIN_EMAIL) {
        window.location.href = "admin.html";
        return;
      }
      adminEmail.textContent = user.email;
      drawerEmail.textContent = user.email;
      await loadProducts();
      renderProductsLayout();
    });

    async function logoutAdmin() {
      await signOut(auth);
      window.location.href = "admin.html";
    }

    logoutBtn.onclick = logoutAdmin;
    drawerLogoutBtn.onclick = logoutAdmin;

    // ===== BLOQUEIO DE ZOOM =====
    document.addEventListener("wheel", (e) => {
      if (e.ctrlKey || e.metaKey) e.preventDefault();
    }, { passive: false });

    document.addEventListener("keydown", (e) => {
      const blockedKeys = ["+", "-", "=", "0"];
      if ((e.ctrlKey || e.metaKey) && blockedKeys.includes(e.key)) {
        e.preventDefault();
      }
    });

    // ===== INSTALAÇÃO PWA =====
    let deferredPrompt = null;
    const installBtn = document.getElementById("installBtn");

    if (installBtn) {
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone = window.matchMedia("(display-mode: standalone)").matches || navigator.standalone;

      installBtn.style.display = "none";

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (!isStandalone) {
          installBtn.style.display = "flex";
        }
      });

      if (isIOS && !isStandalone) {
        installBtn.style.display = "flex";
      }

      installBtn.addEventListener("click", async () => {
        if (isIOS) {
          alert("Para instalar:\n\nSafari → Compartilhar → Adicionar à Tela de Início");
          return;
        }
        if (!deferredPrompt) {
          alert("Instalação indisponível no momento.");
          return;
        }
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBtn.style.display = "none";
      });

      window.addEventListener("appinstalled", () => {
        installBtn.style.display = "none";
      });
    }
  </script>

</body>
</html>
